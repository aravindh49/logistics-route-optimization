<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Logistics Optimizer | TamilNaduAI</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar Control Panel -->
        <aside class="sidebar">
            <div class="brand">
                <h1>TamilNadu<span>AI</span></h1>
                <p>Logistics Optimization System</p>
            </div>

            <div class="controls">
                <div class="input-group">
                    <label>Origin City</label>
                    <select id="start-city">
                        <option value="" disabled selected>Select Origin...</option>
                    </select>
                </div>

                <div class="route-icon">
                    <div class="line"></div>
                    <span>➜</span>
                    <div class="line"></div>
                </div>

                <div class="input-group">
                    <label>Destination City</label>
                    <select id="end-city">
                        <option value="" disabled selected>Select Destination...</option>
                    </select>
                </div>

                <!-- Future Extensibility: Add Simulator Dropdown here if needed later -->

                <button id="optimize-btn" class="btn-primary">
                    Find Optimized Route
                </button>
            </div>

            <!-- Results Section -->
            <div id="results-panel" class="results-panel hidden">
                <h3>Optimization Results</h3>

                <div class="kpi-grid">
                    <div class="kpi-card highlight">
                        <span class="label">Time Saved</span>
                        <span class="value" id="val-time-saved">--</span>
                    </div>

                    <div class="kpi-card">
                        <span class="label">Baseline Time</span>
                        <span class="value-sm" id="val-base-time">--</span>
                    </div>
                    <div class="kpi-card">
                        <span class="label">AI Time</span>
                        <span class="value-sm" id="val-opt-time">--</span>
                    </div>

                    <div class="kpi-card">
                        <span class="label">Baseline Cost</span>
                        <span class="value-sm" id="val-base-cost">--</span>
                    </div>
                    <div class="kpi-card">
                        <span class="label">AI Cost</span>
                        <span class="value-sm" id="val-opt-cost">--</span>
                    </div>
                </div>

                <div class="kpi-card efficiency" style="text-align: left; padding: 1.5rem;">
                    <h4 style="margin-top: 0; margin-bottom: 1rem; color: #fff;">Efficiency Metrics</h4>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span class="label">Time Efficiency</span>
                        <span class="value-sm" id="val-time-eff" style="color: #10b981;">--</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span class="label">Cost Efficiency</span>
                        <span class="value-sm" id="val-cost-eff" style="color: #10b981;">--</span>
                    </div>
                    <div
                        style="display: flex; justify-content: space-between; margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                        <span class="label">Baseline Score</span>
                        <span class="value-sm" id="val-base-score">--</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span class="label">AI Route Score</span>
                        <span class="value" id="val-opt-score" style="color: #3b82f6;">--</span>
                    </div>
                </div>

                <button id="download-btn" class="btn-secondary">Download Report (PDF)</button>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-wrapper">
            <div class="map-overlay">
                <h2>Live Route Visualization</h2>
                <div class="legend">
                    <span class="item"><span class="dot baseline"></span> Baseline</span>
                    <span class="item"><span class="dot optimized"></span> AI Optimized</span>
                </div>
            </div>
            <div id="map-visual"></div>
        </main>
    </div>

    <!-- Application Logic -->
    <script src="/static/script.js?v=3" defer></script>
</body>

</html>
